services:
    - type: web
    name: fantasyng-backend1
    env: node
    buildCommand: npm install
    startCommand: npm start
    envVars:
            - key: NODE_ENV
        value: production
            - key: PORT
        value: 10000
            - key: MONGODB_URI
        value: PASTE_YOUR_REAL_MONGODB_URI_FROM_LAST_NIGHT_HERE
            - key: JWT_SECRET
        value: fantasyng-super-secret-2026-prod-key
